services:
  web:
    build: .
    container_name: xinyang_web
    ports:
      - "8080:80"
    environment:
      APP_URL: http://localhost:8080
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: xinyang_db
      DB_USER: xinyang_user
      DB_PASS: xinyang_pass
    depends_on:
      - db
    volumes:
      - .:/var/www/html

  db:
    image: mysql:8.0
    container_name: xinyang_db
    restart: always
    environment:
      MYSQL_DATABASE: xinyang_db
      MYSQL_USER: xinyang_user
      MYSQL_PASSWORD: xinyang_pass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: xinyang_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db

volumes:
  db_data:
